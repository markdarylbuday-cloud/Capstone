<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EBENEZER - Gadget Store</title>
   <style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f9f9f9;
    }

    /* HEADER */
    header {
        background: #0d47a1; /* deep blue */
        color: #ffcc00; /* yellow text */
        padding: 15px;
        text-align: center;
    }

    nav {
        display: flex;
        justify-content: space-between;
        padding: 10px 20px;
        background: #ffffff;
        border-bottom: 3px solid #ffcc00;
    }

    nav a {
        text-decoration: none;
        color: #0d47a1;
        margin: 0 10px;
        font-weight: bold;
    }

    /* HERO SECTION */
    .hero {
        background: linear-gradient(rgba(13,71,161,0.8), rgba(13,71,161,0.8)),
                    url('https://via.placeholder.com/1200x400');
        background-size: cover;
        color: #ffcc00;
        text-align: center;
        padding: 20px 20px;
    }

    .hero h1 {
        font-size: 40px;
    }

    /* CATEGORIES */
    .categories {
        padding: 20px;
        text-align: center;
    }

    .category-box {
        display: inline-block;
        background: #ffffff;
        padding: 15px;
        margin: 10px;
        border-radius: 10px;
        width: 150px;
        cursor: pointer;
        border: 2px solid #0d47a1;
        color: #0d47a1;
        font-weight: bold;
    }

    .category-box:hover {
        background: #ffcc00;
        color: #000;
    }

    /* PRODUCTS */
    .products {
        padding: 20px;
    }

    .product-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
    }

    .product {
        background: white;
        padding: 15px;
        border-radius: 10px;
        text-align: center;
        border-top: 5px solid #0d47a1;
    }

    .product img {
        width: 50%;
        height: 150px;
        object-fit: cover;
    }

    .product h3 {
        color: #0d47a1;
    }

    .product button {
        background: #ffcc00;
        color: #000;
        border: none;
        padding: 10px;
        cursor: pointer;
        margin-top: 10px;
        font-weight: bold;
        border-radius: 5px;
    }

    .product button:hover {
        background: #0d47a1;
        color: #ffcc00;
    }

    /* FOOTER */
    footer {
        background: #0d47a1;
        color: #ffcc00;
        text-align: center;
        padding: 15px;
        margin-top: 20px;
    }
</style>
</head>

<body>

<header>
    <h2>EBENEZER Gadget Store</h2>
</header>

<nav>
    <div>
        <a href="#">Home</a>
        <a href="catalogue.html">Products</a>
    </div>
</nav>

<section class="hero">
    <h1>Welcome to EBENEZER</h1>
    <p>Browse the latest gadgets anytime, anywhere</p>
</section>

<section class="categories">
    <h2>Categories</h2>
    <div class="category-box">Phones</div>
    <div class="category-box">Laptops</div>
    <div class="category-box">Accessories</div>
</section>

<section class="products">
    <h2>Featured Products</h2>
    <div class="product-grid" id="productList"></div>
</section>

<footer>
    <p>© 2026 EBENEZER. All Rights Reserved.</p>
</footer>

<script>
const products = [
    {
        name: "iPhone 13",
        price: "₱35",
        description: "Latest Apple smartphone with advanced camera features.",
        image: "images/iPhone13.jpg"
    },
    {
        name: "Samsung Galaxy S21",
        price: "₱30",
        description: "High-performance Android smartphone.",
        image: "images/Samsung.jpg"
    },
    {
        name: "Dell Laptop",
        price: "₱45",
        description: "Powerful laptop for work and gaming.",
        image: "images/Dell.jpg"
    },
    {
        name: "Wireless Earbuds",
        price: "₱2",
        description: "Compact earbuds with high-quality sound.",
        image: "images/earbuds.jpg"
    }
];

const productList = document.getElementById("productList");

products.forEach((product, index) => {
    productList.innerHTML += `
        <div class="product">
            <img src="${product.image}">
            <h3>${product.name}</h3>
            <p class="price">${product.price}</p>
            <p>${product.description}</p>
            <button onclick="viewDetails(${index})">Buy Now</button>
        </div>
    `;
});

function viewDetails(index) {
    alert("Redirecting to product details for: " + products[index].name);
}

function viewDetails(index) {
    localStorage.setItem("selectedProduct", JSON.stringify(products[index]));
    window.location.href = "product-details.html";
}
</script>


</body>
</html>

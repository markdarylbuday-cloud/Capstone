<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EBENEZER - Shopping Cart</title>

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f5f5;
    }

    header {
        background: #0d3b66;
        color: #ffd60a;
        text-align: center;
        padding: 15px;
    }

    .container {
        padding: 20px;
    }

    .cart-item {
        background: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 10px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .cart-item img {
        width: 80px;
        height: 80px;
        object-fit: cover;
        border-radius: 8px;
    }

    .info {
        flex: 1;
        margin-left: 15px;
    }

    .info h3 {
        margin: 0;
        color: #0d3b66;
    }

    .price {
        font-weight: bold;
        color: #0d3b66;
    }

    input {
        width: 50px;
        padding: 5px;
        text-align: center;
    }

    button {
        background: #ffd60a;
        color: #0d3b66;
        border: none;
        padding: 8px 10px;
        cursor: pointer;
        border-radius: 5px;
        font-weight: bold;
    }

    button:hover {
        background: #0d3b66;
        color: #ffd60a;
    }

    .total {
        text-align: right;
        font-size: 20px;
        font-weight: bold;
        margin-top: 20px;
        color: #0d3b66;
    }

    .checkout {
        text-align: right;
        margin-top: 10px;
    }

    .checkout button {
        padding: 12px 20px;
    }
</style>

</head>

<body>

<header>
    <h1>Shopping Cart</h1>
</header>

<div class="container" id="cart"></div>

<div class="container">
    <div class="total" id="total">Total: ₱0</div>
    <div class="checkout">
        <button onclick="checkout()">Proceed to Checkout</button>
    </div>
</div>

<script>
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function renderCart() {
    let cartDiv = document.getElementById("cart");
    cartDiv.innerHTML = "";

    let total = 0;

    cart.forEach((item, index) => {
        total += item.price * item.qty;

        cartDiv.innerHTML += `
            <div class="cart-item">
                <img src="${item.image}">
                <div class="info">
                    <h3>${item.name}</h3>
                    <p class="price">₱${item.price.toLocaleString()}</p>
                </div>

                <input type="number" min="1" value="${item.qty}" onchange="updateQty(${index}, this.value)">

                <button onclick="removeItem(${index})">Remove</button>
            </div>
        `;
    });

    document.getElementById("total").innerText = "Total: ₱" + total;
}

function updateQty(index, qty) {
    qty = parseInt(qty);

    if (isNaN(qty) || qty < 1) qty = 1;

    cart[index].qty = qty;
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function removeItem(index) {
    cart.splice(index, 1);
    localStorage.setItem("cart", JSON.stringify(cart));
    renderCart();
}

function checkout() {
    alert("Proceeding to payment page...");
    window.location.href = "payment.html";
}

renderCart();
</script>

</body>
</html>
